name: outline_md
description: "A markdown-based outline editor."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  flutter_markdown: ^0.7.6
  file_picker: ^9.2.1
  path_provider: ^2.1.5
  uuid: ^4.5.1
  shared_preferences: ^2.5.3
  collection: ^1.19.1
  path: ^1.9.1
  markdown: ^7.3.0
  google_fonts: ^8.0.2
  window_manager: ^0.4.3
  flutter_math_fork: ^0.7.4
  webview_flutter: ^4.13.1
  webview_flutter_wkwebview: ^3.24.0
  desktop_drop: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/mermaid/
    - assets/fonts/
